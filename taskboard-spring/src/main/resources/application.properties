spring.application.name=taskboard
spring.config.import=optional:file:.env[.properties]
spring.jackson.default-property-inclusion=non_null
server.error.include-message=never

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/taskboard_dev}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:taskboard}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:taskboard_dev_password}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.security.oauth2.resourceserver.jwt.issuer-uri=${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI:https://keycloak.eseidinger.de/realms/taskboard-dev}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI:https://keycloak.eseidinger.de/realms/taskboard-dev/protocol/openid-connect/certs}

taskboard.public-config.api-base-path=${TASKBOARD_PUBLIC_API_BASE_PATH:/api/v1}
taskboard.public-config.keycloak-url=${TASKBOARD_PUBLIC_KEYCLOAK_URL:https://keycloak.eseidinger.de}
taskboard.public-config.keycloak-realm=${TASKBOARD_PUBLIC_KEYCLOAK_REALM:taskboard-dev}
taskboard.public-config.keycloak-client-id=${TASKBOARD_PUBLIC_KEYCLOAK_CLIENT_ID:taskboard}

spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=validate

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

management.endpoints.web.exposure.include=health,metrics,prometheus
management.metrics.export.prometheus.enabled=true

logging.pattern.console=%d{ISO8601} [%X{traceId}] [%thread] %-5level %logger{36} - %msg%n
