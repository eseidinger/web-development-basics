spring.application.name=taskboard
spring.jackson.default-property-inclusion=non_null
server.error.include-message=never

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/taskboard_dev}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:taskboard}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:taskboard_dev_password}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=validate

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

management.endpoints.web.exposure.include=health,metrics,prometheus
