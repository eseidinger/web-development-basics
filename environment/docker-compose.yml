services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: taskboard-postgres
    environment:
      POSTGRES_USER: taskboard
      POSTGRES_PASSWORD: taskboard_dev_password
      POSTGRES_DB: taskboard_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskboard"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - taskboard-network

  # Keycloak - OIDC Provider
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: taskboard-keycloak
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: taskboard
      KC_DB_PASSWORD: taskboard_dev_password
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: 8090
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
    ports:
      - "8090:8080"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - keycloak_data:/opt/keycloak/data
    command:
      - start-dev
    networks:
      - taskboard-network
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && exec 3>&- && exec 3>&- || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Keycloak realm initialization
  keycloak-init:
    image: alpine:latest
    container_name: taskboard-keycloak-init
    depends_on:
      keycloak:
        condition: service_healthy
    volumes:
      - ./keycloak-realm-export.json:/tmp/keycloak-realm-export.json:ro
      - ./init-keycloak.sh:/tmp/init-keycloak.sh:ro
    entrypoint: /bin/sh
    command:
      - -c
      - |
        apk add --no-cache curl jq
        sh /tmp/init-keycloak.sh
    networks:
      - taskboard-network
    environment:
      - KEYCLOAK_URL=http://keycloak:8080
    profiles:
      - init

  # Prometheus - Metrics collection
  prometheus:
    image: prom/prometheus:latest
    container_name: taskboard-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
    networks:
      - taskboard-network
    depends_on:
      - loki

  # Loki - Log aggregation
  loki:
    image: grafana/loki:latest
    container_name: taskboard-loki
    ports:
      - "3100:3100"
    volumes:
      - ./loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command:
      - -config.file=/etc/loki/local-config.yaml
    networks:
      - taskboard-network

  # Promtail - Log shipper to Loki
  promtail:
    image: grafana/promtail:latest
    container_name: taskboard-promtail
    volumes:
      - ./promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command:
      - -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - taskboard-network

  # Jaeger - Distributed tracing
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: taskboard-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"  # Jaeger UI
      - "4318:4318"    # OTLP HTTP receiver
      - "4317:4317"    # OTLP gRPC receiver
      - "14250:14250"  # gRPC
    networks:
      - taskboard-network

  # Grafana - Dashboards and visualization
  grafana:
    image: grafana/grafana:latest
    container_name: taskboard-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./grafana-dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
    networks:
      - taskboard-network

volumes:
  postgres_data:
  keycloak_data:
  prometheus_data:
  loki_data:
  grafana_data:

networks:
  taskboard-network:
    driver: bridge
